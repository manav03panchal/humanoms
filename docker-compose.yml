services:
  humanoms:
    build: .
    # Run as host user so mounted ~/.claude credentials are readable,
    # and non-root so the Claude Code SDK's --dangerously-skip-permissions works.
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3747:3747"
    volumes:
      - humanoms-data:/app/data
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.claude.json:${HOME}/.claude.json
    environment:
      - HOME=${HOME}
      - HUMANOMS_MASTER_KEY=${HUMANOMS_MASTER_KEY}
      - HUMANOMS_HOST=0.0.0.0
      - CHAT_PROVIDER=${CHAT_PROVIDER:-anthropic}
      - CHAT_API_KEY=${CHAT_API_KEY}
      - CHAT_BASE_URL=${CHAT_BASE_URL:-}
      - CHAT_MODEL=${CHAT_MODEL:-}
    restart: unless-stopped

volumes:
  humanoms-data:
